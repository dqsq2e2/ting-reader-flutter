name: Build Releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Resolve build version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_NAME="${GITHUB_REF_NAME#v}"
          else
            BUILD_NAME="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          fi
          echo "BUILD_NAME=${BUILD_NAME}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            test -n "$ANDROID_KEYSTORE_BASE64"
            test -n "$ANDROID_KEYSTORE_PASSWORD"
            test -n "$ANDROID_KEY_ALIAS"
            test -n "$ANDROID_KEY_PASSWORD"
          fi
          if [[ -n "$ANDROID_KEYSTORE_BASE64" ]]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
            cat > android/key.properties <<EOF
          storeFile=release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
          fi
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - name: Run tests if present
        run: |
          if [[ -d test ]]; then
            flutter test
          else
            echo "No committed test scripts to run."
          fi
      - run: flutter build apk --release --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER"
      - run: flutter build appbundle --release --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER"
      - run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/ting-reader-flutter-android.apk
          cp build/app/outputs/bundle/release/app-release.aab dist/ting-reader-flutter-android.aab
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/*

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - shell: pwsh
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:\s+(.+)$').Matches[0].Groups[1].Value.Split('+')[0]
          if ($env:GITHUB_REF -like 'refs/tags/v*') { $version = $env:GITHUB_REF_NAME.TrimStart('v') }
          flutter build windows --release --build-name $version --build-number $env:GITHUB_RUN_NUMBER
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:\s+(.+)$').Matches[0].Groups[1].Value.Split('+')[0]
          if ($env:GITHUB_REF -like 'refs/tags/v*') { $version = $env:GITHUB_REF_NAME.TrimStart('v') }
          $env:TING_READER_VERSION = $version
          $env:TING_READER_BUILD_DIR = (Resolve-Path "build/windows/x64/runner/Release").Path
          $env:TING_READER_OUTPUT_DIR = (Resolve-Path "dist").Path
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "windows/installer/ting_reader.iss"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*

  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update
      - run: sudo apt-get install -y ninja-build libgtk-3-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_NAME="${GITHUB_REF_NAME#v}"
          else
            BUILD_NAME="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          fi
          flutter build linux --release --build-name "$BUILD_NAME" --build-number "$GITHUB_RUN_NUMBER"
      - run: |
          mkdir -p dist
          tar -C build/linux/x64/release/bundle -czf dist/TingReader-linux-x64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_NAME="${GITHUB_REF_NAME#v}"
          else
            BUILD_NAME="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          fi
          flutter build macos --release --build-name "$BUILD_NAME" --build-number "$GITHUB_RUN_NUMBER"
      - run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/*.app dist/TingReader-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*

  ios:
    name: iOS unsigned
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_NAME="${GITHUB_REF_NAME#v}"
          else
            BUILD_NAME="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          fi
          flutter build ios --release --no-codesign --build-name "$BUILD_NAME" --build-number "$GITHUB_RUN_NUMBER"
      - run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app dist/TingReader-ios-nosign.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: dist/*

  release:
    name: Publish GitHub Release
    needs: [android, windows, linux, macos, ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
