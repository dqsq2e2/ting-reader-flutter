name: Build Releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/ting-reader-flutter-android.apk
          cp build/app/outputs/bundle/release/app-release.aab dist/ting-reader-flutter-android.aab
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/*

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath dist/TingReader-windows-x64.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*

  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update
      - run: sudo apt-get install -y ninja-build libgtk-3-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build linux --release
      - run: |
          mkdir -p dist
          tar -C build/linux/x64/release/bundle -czf dist/TingReader-linux-x64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build macos --release
      - run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/*.app dist/TingReader-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*

  ios:
    name: iOS unsigned
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app dist/TingReader-ios-nosign.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: dist/*

  release:
    name: Publish GitHub Release
    needs: [android, windows, linux, macos, ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
