name: Build Releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PUB_HOSTED_URL: https://pub.dev

jobs:
  dependencies:
    name: Resolve dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Refresh Flutter dependency lockfile
        run: flutter pub upgrade
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-lockfile
          path: pubspec.lock
      - name: Commit refreshed lockfile to main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if git diff --quiet -- pubspec.lock; then
            echo "pubspec.lock is already current."
            exit 0
          fi
          cp pubspec.lock /tmp/pubspec.lock
          git fetch origin main
          git checkout main
          cp /tmp/pubspec.lock pubspec.lock
          if git diff --quiet -- pubspec.lock; then
            echo "main already has the refreshed lockfile."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.lock
          git commit -m "Update Flutter dependency lockfile"
          git push origin HEAD:main

  android:
    name: Android
    needs: dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O commandlinetools.zip
          mkdir -p "$HOME/android-sdk/cmdline-tools"
          unzip -q commandlinetools.zip -d "$HOME/android-sdk/cmdline-tools"
          mv "$HOME/android-sdk/cmdline-tools/cmdline-tools" "$HOME/android-sdk/cmdline-tools/latest"
          echo "ANDROID_HOME=$HOME/android-sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> "$GITHUB_ENV"
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$HOME/android-sdk/platform-tools" >> "$GITHUB_PATH"
      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: flutter-lockfile
          path: .
      - name: Resolve build version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_NAME="${GITHUB_REF_NAME#v}"
          else
            BUILD_NAME="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          fi
          echo "BUILD_NAME=${BUILD_NAME}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            test -n "$ANDROID_KEYSTORE_BASE64"
            test -n "$ANDROID_KEYSTORE_PASSWORD"
            test -n "$ANDROID_KEY_ALIAS"
            test -n "$ANDROID_KEY_PASSWORD"
          fi
          if [[ -n "$ANDROID_KEYSTORE_BASE64" ]]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
            printf '%s\n' \
              "storeFile=release.jks" \
              "storePassword=$ANDROID_KEYSTORE_PASSWORD" \
              "keyAlias=$ANDROID_KEY_ALIAS" \
              "keyPassword=$ANDROID_KEY_PASSWORD" \
              > android/key.properties
          fi
      - run: flutter pub get --enforce-lockfile
      - run: flutter analyze --no-fatal-infos
      - name: Run tests if present
        run: |
          if [[ -d test ]]; then
            flutter test
          else
            echo "No committed test scripts to run."
          fi
      - run: flutter build apk --release --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER"
      - run: flutter build appbundle --release --build-name "$BUILD_NAME" --build-number "$BUILD_NUMBER"
      - run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk dist/ting-reader-flutter-android.apk
          cp build/app/outputs/bundle/release/app-release.aab dist/ting-reader-flutter-android.aab
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/*

  windows:
    name: Windows
    needs: dependencies
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: flutter-lockfile
          path: .
      - run: flutter pub get --enforce-lockfile
      - shell: pwsh
        env:
          CMAKE_GENERATOR: Visual Studio 17 2022
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:\s+(.+)$').Matches[0].Groups[1].Value.Split('+')[0]
          if ($env:GITHUB_REF -like 'refs/tags/v*') { $version = $env:GITHUB_REF_NAME.TrimStart('v') }
          flutter build windows --release --build-name $version --build-number $env:GITHUB_RUN_NUMBER
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:\s+(.+)$').Matches[0].Groups[1].Value.Split('+')[0]
          if ($env:GITHUB_REF -like 'refs/tags/v*') { $version = $env:GITHUB_REF_NAME.TrimStart('v') }
          $env:TING_READER_VERSION = $version
          $env:TING_READER_BUILD_DIR = (Resolve-Path "build/windows/x64/runner/Release").Path
          $env:TING_READER_OUTPUT_DIR = (Resolve-Path "dist").Path
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "windows/installer/ting_reader.iss"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*

  linux:
    name: Linux
    needs: dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq
        timeout-minutes: 5
      - run: |
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libsecret-1-dev
        timeout-minutes: 10
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: flutter-lockfile
          path: .
      - run: flutter pub get --enforce-lockfile
      - run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_NAME="${GITHUB_REF_NAME#v}"
          else
            BUILD_NAME="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          fi
          flutter build linux --release --build-name "$BUILD_NAME" --build-number "$GITHUB_RUN_NUMBER"
      - run: |
          mkdir -p dist
          tar -C build/linux/x64/release/bundle -czf dist/TingReader-linux-x64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*

  macos:
    name: macOS
    needs: dependencies
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: flutter-lockfile
          path: .
      - run: flutter pub get --enforce-lockfile
      - run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_NAME="${GITHUB_REF_NAME#v}"
          else
            BUILD_NAME="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          fi
          flutter build macos --release --build-name "$BUILD_NAME" --build-number "$GITHUB_RUN_NUMBER"
      - run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/*.app dist/TingReader-macos.zip
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*

  ios:
    name: iOS self-sign IPA
    needs: dependencies
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: flutter-lockfile
          path: .
      - run: flutter pub get --enforce-lockfile
      - run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            BUILD_NAME="${GITHUB_REF_NAME#v}"
          else
            BUILD_NAME="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          fi
          flutter build ios --release --no-codesign --build-name "$BUILD_NAME" --build-number "$GITHUB_RUN_NUMBER"
      - run: |
          mkdir -p dist
          mkdir -p dist/Payload
          ditto build/ios/iphoneos/Runner.app dist/Payload/Runner.app
          cd dist
          ditto -c -k --sequesterRsrc --keepParent Payload TingReader-ios-self-sign.ipa
          rm -rf Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: dist/*

  release:
    name: Publish GitHub Release
    needs: [android, windows, linux, macos, ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Remove legacy iOS archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete-asset "$GITHUB_REF_NAME" "TingReader-ios-nosign.zip" --yes || true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
